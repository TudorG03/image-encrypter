services:
  c01:
    build: ./c01
    container_name: c01
    ports:
      - "8080:8080"
    networks:
      - dadnet
    depends_on:
      c02:
        condition: service_healthy
      c05:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: c02
      C05_HOST: c05
      REDIS_HOST: redis
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}
      JWT_SECRET: ${JWT_SECRET:-changeme-32-char-secret-for-hmac-256}

  c02:
    build: ./c02
    container_name: c02
    ports:
      - "15672:15672"
    expose:
      - "5672"
    networks:
      - dadnet
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  c03:
    build:
      context: .
      dockerfile: c03/Dockerfile
    container_name: c03
    networks:
      - dadnet
    depends_on:
      c02:
        condition: service_healthy
      c05:
        condition: service_healthy
    volumes:
      - mpi_volume:/mpi
    environment:
      RABBITMQ_HOST: c02
      C05_HOST: c05
      C01_HOST: c01

  c04:
    build:
      context: .
      dockerfile: c04/Dockerfile
    container_name: c04
    networks:
      - dadnet
    expose:
      - "22"
    volumes:
      - mpi_volume:/mpi

  c05:
    build: ./c05
    container_name: c05
    ports:
      - "3001:3001"
    networks:
      - dadnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      INTERNAL_SECRET: ${INTERNAL_SECRET:-changeme-internal-secret}

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dadnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dadnet:
    driver: bridge

volumes:
  mpi_volume:
